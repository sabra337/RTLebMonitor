name: RSS Ingest Cron

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ingest-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend RSS ingest
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$BACKEND_BASE_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Missing BACKEND_BASE_URL or CRON_SECRET GitHub secret."
            exit 1
          fi

          BASE_URL="$(printf '%s' "$BACKEND_BASE_URL" | tr -d '\r\n' | sed -e 's/^"//' -e 's/"$//')"
          BASE_URL="${BASE_URL%/}"
          if [[ ! "$BASE_URL" =~ ^https?:// ]]; then
            echo "BACKEND_BASE_URL must start with http:// or https://"
            exit 1
          fi

          URL="${BASE_URL}/api/ingest-rss"
          echo "Calling $URL"

          HTTP_CODE=$(curl -sS -o response.json -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$URL")

          cat response.json
          echo "HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            exit 1
          fi
